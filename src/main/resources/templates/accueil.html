<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TechShop - Catalogue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
    <style>
        body {
          background-color: #f8f9fa;
        }
        .navbar-brand span {
          font-weight: bold;
          color: #0d6efd;
        }
        .card-img-top {
          height: 180px;
          object-fit: cover;
          width: 100%;
        }
        .product-card {
          transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .product-card:hover {
          transform: translateY(-5px);
          box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .stock-low {
          color: #dc3545;
          font-weight: 600;
        }
        #panierContainer {
          display: none;
        }
        .toast-container {
          position: fixed;
          bottom: 1rem;
          right: 1rem;
          z-index: 9999;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="#">
            <i class="bi bi-shop me-2"></i><span>TechShop</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav">
                <form class="d-flex ms-3" role="search" onsubmit="event.preventDefault(); rechercherProduits();">
                    <input id="champRecherche" class="form-control me-2" type="search" placeholder="Rechercher un produit..." aria-label="Search">
                    <button class="btn btn-outline-success" type="submit"><i class="bi bi-search"></i></button>
                </form>
                <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house"></i> Accueil</a></li>
                <li class="nav-item"><a class="nav-link" href="/malick.html"><i class="bi bi-bag"></i> Produits</a></li>
                <li class="nav-item"><a class="nav-link" href="/commandes.html"><i class="bi bi-person"></i> Commande</a></li>
                <li class="nav-item">
                    <a id="lienPanier" class="nav-link" href="#" style="position:relative;">
                        <i class="bi bi-cart"></i> Panier
                        <span id="notifPanier" class="badge bg-danger rounded-pill" style="position:absolute; top:0; right:-10px; display:none;">0</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Titre principal -->
<header class="bg-light py-4 border-bottom">
    <div class="container text-center">
        <h1 class="display-5 fw-bold">Découvrez nos Produits</h1>
        <p class="text-muted">Électronique, accessoires, nouveautés & plus</p>
    </div>
</header>

<!-- Catalogue Produits -->
<main class="py-5">
    <div class="container">
        <h2 class="mb-4 text-primary"><i class="bi bi-star-fill"></i> Produits Vedettes</h2>
        <div id="produitsVedettesContainer" class="row g-4 mb-5"></div>

        <h2 class="mb-4 text-success"><i class="bi bi-clock-history"></i> Nouveaux Produits</h2>
        <div id="nouveauxProduitsContainer" class="row g-4 mb-5"></div>

        <h2 class="mb-4"><i class="bi bi-grid"></i> Tous les Produits</h2>
        <div id="produitsContainer" class="row g-4"></div>
    </div>
</main>

<!-- Panier -->
<section class="container mb-5" id="panierContainer">
    <h2>Panier</h2>
    <div id="panierListe" class="list-group mb-3"></div>
    <button id="btnValiderCommande" class="btn btn-success">Valider la commande</button>
</section>

<!-- Zone Toast -->
<div class="toast-container" id="toastContainer"></div>

<!-- Footer -->
<footer class="bg-dark text-white text-center py-3 mt-4">
    <div class="container">
        <small>&copy; 2025 TechShop. Tous droits réservés.</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let cartItems = [];

    function afficherToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toastEl = document.createElement('div');
      const id = 'toast-' + Date.now();
      toastEl.className = `toast align-items-center text-bg-${type} border-0 show`;
      toastEl.setAttribute('role', 'alert');
      toastEl.setAttribute('aria-live', 'assertive');
      toastEl.setAttribute('aria-atomic', 'true');
      toastEl.setAttribute('id', id);
      toastEl.innerHTML = `
        <div class="d-flex">
          <div class="toast-body">${message}</div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Fermer"></button>
        </div>
      `;
      container.appendChild(toastEl);
      setTimeout(() => {
        toastEl.remove();
      }, 4000);
    }

    function majNotifPanier() {
      const notif = document.getElementById('notifPanier');
      const total = cartItems.reduce((sum, item) => sum + item.quantite, 0);
      notif.style.display = total > 0 ? 'inline-block' : 'none';
      notif.textContent = total;
    }

    async function rechercherProduits() {
      const motCle = document.getElementById("champRecherche").value.trim();
      const container = document.getElementById('produitsContainer');
      if (motCle === "") {
        afficherProduits('/api/produits', 'produitsContainer');
        return;
      }
      try {
        const response = await fetch(`/api/produits/recherche?motCle=${encodeURIComponent(motCle)}`);
        if (!response.ok) throw new Error('Erreur de recherche');
        const resultats = await response.json();
        container.innerHTML = resultats.length === 0
          ? `<div class="col-12 text-center text-muted">Aucun produit trouvé.</div>`
          : "";
        resultats.forEach(p => {
          const imageSrc = p.imageUrl && p.imageUrl.trim() !== '' ? p.imageUrl : '/images/produits/default.png';
          const stockClass = p.quantiteStock <= p.seuilReapprovisionnement ? 'stock-low' : 'text-success';
          const card = document.createElement('div');
          card.className = 'col-md-4 col-lg-3';
          card.innerHTML = `
            <div class="card h-100 product-card">
              <img src="${imageSrc}" class="card-img-top" alt="${p.nom}">
              <div class="card-body d-flex flex-column">
                <h5 class="card-title">${p.nom}</h5>
                <p class="card-text text-muted">${p.categorie}</p>
                <p class="card-text fw-bold text-danger">${p.prixUnitaire.toFixed(2)} FCFA</p>
                <p class="card-text ${stockClass}">Stock: ${p.quantiteStock}</p>
                <div class="mt-auto">
                  <button class="btn btn-outline-primary w-100 ajouter-panier" data-id="${p.id}">
                    <i class="bi bi-cart-plus"></i> Ajouter au panier
                  </button>
                </div>
              </div>
            </div>`;
          container.appendChild(card);
        });
        document.querySelectorAll('.ajouter-panier').forEach(btn => {
          btn.addEventListener('click', () => ajouterAuPanier(btn.dataset.id));
        });
      } catch (e) {
        container.innerHTML = `<div class="col-12 text-center text-danger">Erreur lors de la recherche.</div>`;
      }
    }

    async function ajouterAuPanier(produitId) {
      try {
        const res = await fetch('/api/produits/' + produitId);
        if (!res.ok) throw new Error('Produit introuvable');
        const produit = await res.json();
        const index = cartItems.findIndex(item => item.produit.id === produit.id);
        if (index >= 0) cartItems[index].quantite++;
        else cartItems.push({ produit, quantite: 1 });
        majNotifPanier();
        afficherToast('Produit ajouté au panier !', 'success');
      } catch (e) {
        afficherToast('Erreur : ' + e.message, 'danger');
      }
    }

    async function validerCommande() {
      if (cartItems.length === 0) return afficherToast('Le panier est vide.', 'warning');
      const nom = prompt("Veuillez entrer votre nom pour la commande :") || "Client anonyme";
      const commande = {
        nomClient: nom,
        lignes: cartItems.map(item => ({ produitId: item.produit.id, quantite: item.quantite }))
      };
      try {
        const res = await fetch('/api/commandes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(commande)
        });
        if (!res.ok) {
          const err = await res.text();
          throw new Error(err);
        }
        cartItems = [];
        majNotifPanier();
        afficherPanier();
        afficherToast('Commande validée avec succès !', 'success');
      } catch (e) {
        afficherToast('Erreur : ' + e.message, 'danger');
      }
    }

    function afficherPanier() {
      const panierListe = document.getElementById('panierListe');
      panierListe.innerHTML = '';
      if (cartItems.length === 0) {
        panierListe.innerHTML = '<p>Votre panier est vide.</p>';
        document.getElementById('btnValiderCommande').style.display = 'none';
        document.getElementById('panierContainer').style.display = 'block';
        return;
      }
      cartItems.forEach((item, index) => {
        const ligne = document.createElement('div');
        ligne.className = 'list-group-item d-flex justify-content-between align-items-center';
        ligne.innerHTML = `
          <div>
            <strong>${item.produit.nom}</strong><br/>
            Prix : ${item.produit.prixUnitaire.toFixed(2)} FCFA
          </div>
          <div>
            <input type="number" min="1" value="${item.quantite}" style="width:60px" data-index="${index}" class="quantiteInput"/>
            <button class="btn btn-sm btn-danger ms-2 btn-supprimer" data-index="${index}"><i class="bi bi-trash"></i></button>
          </div>`;
        panierListe.appendChild(ligne);
      });
      document.querySelectorAll('.quantiteInput').forEach(input => {
        input.addEventListener('change', e => {
          const i = e.target.dataset.index;
          cartItems[i].quantite = Math.max(1, parseInt(e.target.value));
          majNotifPanier();
        });
      });
      document.querySelectorAll('.btn-supprimer').forEach(btn => {
        btn.addEventListener('click', e => {
          const i = e.target.closest('button').dataset.index;
          cartItems.splice(i, 1);
          afficherPanier();
          majNotifPanier();
          afficherToast('Produit retiré du panier.', 'info');
        });
      });
      document.getElementById('btnValiderCommande').style.display = 'inline-block';
      document.getElementById('panierContainer').style.display = 'block';
    }

    function afficherProduits(url, containerId) {
      fetch(url)
        .then(res => res.json())
        .then(produits => {
          const container = document.getElementById(containerId);
          container.innerHTML = '';
          produits.forEach(p => {
            const stockClass = p.quantiteStock <= p.seuilReapprovisionnement ? 'stock-low' : 'text-success';
            const imageSrc = p.imageUrl && p.imageUrl.trim() !== '' ? p.imageUrl : '/images/produits/default.png';
            const card = document.createElement('div');
            card.className = 'col-md-4 col-lg-3';
            card.innerHTML = `
              <div class="card h-100 product-card">
                <img src="${imageSrc}" class="card-img-top" alt="${p.nom}">
                <div class="card-body d-flex flex-column">
                  <h5 class="card-title">${p.nom}</h5>
                  <p class="card-text text-muted">${p.categorie}</p>
                  <p class="card-text fw-bold text-danger">${p.prixUnitaire.toFixed(2)} FCFA</p>
                  <p class="card-text ${stockClass}">Stock: ${p.quantiteStock}</p>
                  <div class="mt-auto">
                    <button class="btn btn-outline-primary w-100 ajouter-panier" data-id="${p.id}">
                      <i class="bi bi-cart-plus"></i> Ajouter au panier
                    </button>
                  </div>
                </div>
              </div>`;
            container.appendChild(card);
          });
          container.querySelectorAll('.ajouter-panier').forEach(btn => {
            btn.addEventListener('click', () => ajouterAuPanier(btn.dataset.id));
          });
        })
        .catch(err => {
          document.getElementById(containerId).innerHTML = '<div class="col-12 text-center text-danger">Erreur de chargement.</div>';
        });
    }

    document.getElementById('lienPanier').addEventListener('click', e => {
      e.preventDefault();
      document.getElementById('panierContainer').style.display = 'block';
      document.getElementById('produitsVedettesContainer').parentElement.style.display = 'none';
      document.getElementById('nouveauxProduitsContainer').parentElement.style.display = 'none';
      document.getElementById('produitsContainer').parentElement.style.display = 'none';
      afficherPanier();
    });

    document.getElementById('btnValiderCommande').addEventListener('click', validerCommande);

    // Init
    afficherProduits('/api/produits/vedettes', 'produitsVedettesContainer');
    afficherProduits('/api/produits/nouveaux', 'nouveauxProduitsContainer');
    afficherProduits('/api/produits', 'produitsContainer');
    majNotifPanier();
</script>

</body>
</html>
