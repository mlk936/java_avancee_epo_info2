<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gestion des Commandes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="bg-light">
<div class="container py-5">
    <h1 class="mb-4 text-center">📦 Gestion des Commandes</h1>

    <!-- Création d’une nouvelle commande -->
    <div class="card mb-5 shadow-sm">
        <div class="card-header bg-primary text-white">
            <h2 class="h5 mb-0">Nouvelle Commande</h2>
        </div>
        <div class="card-body">
            <form id="commandeForm" novalidate>
                <div class="mb-3">
                    <label for="nomClient" class="form-label">Nom du client</label>
                    <input type="text" class="form-control" id="nomClient" name="nomClient" required />
                    <div class="invalid-feedback">Veuillez saisir le nom du client.</div>
                </div>
                <div class="mb-3">
                    <label for="dateCommande" class="form-label">Date de commande</label>
                    <input type="date" class="form-control" id="dateCommande" name="dateCommande" required />
                    <div class="invalid-feedback">Veuillez sélectionner une date de commande.</div>
                </div>
                <div id="lignesContainer" class="mb-3">
                    <label class="form-label">Lignes de commande</label>
                </div>
                <button type="button" class="btn btn-outline-secondary mb-3" onclick="ajouterLigne()">+ Ajouter une ligne</button><br />
                <button type="submit" class="btn btn-success">Créer la commande</button>
            </form>
        </div>
    </div>

    <!-- Liste des commandes -->
    <div class="card mb-5 shadow-sm">
        <div class="card-header bg-info text-white">
            <h2 class="h5 mb-0">Commandes par date</h2>
        </div>
        <div class="card-body">
            <div class="row g-2 mb-3">
                <div class="col-md-8">
                    <label for="filtreDate" class="form-label">Sélectionner une date</label>
                    <input type="date" class="form-control" id="filtreDate" name="filtreDate" />
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button class="btn btn-primary w-100" onclick="chargerCommandes()">Charger les commandes</button>
                </div>
            </div>
            <ul class="list-group" id="commandeListe"></ul>
        </div>
    </div>

    <!-- Rapport du jour -->
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
            <h2 class="h5 mb-0">📊 Rapport du jour</h2>
        </div>
        <div class="card-body">
            <div class="row g-2 mb-3">
                <div class="col-md-8">
                    <label for="rapportDate" class="form-label">Sélectionner une date</label>
                    <input type="date" class="form-control" id="rapportDate" name="rapportDate" />
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button class="btn btn-outline-dark w-100" onclick="chargerRapport()">Afficher le rapport</button>
                </div>
            </div>
            <div id="rapportResultat"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const today = new Date().toISOString().split('T')[0];
    document.getElementById("filtreDate").value = today;
    document.getElementById("rapportDate").value = today;
    document.getElementById("dateCommande").value = today;

    // Ajoute une ligne par défaut au chargement
    ajouterLigne();

    // Gestion validation et soumission formulaire
    document.getElementById("commandeForm").addEventListener("submit", async function (e) {
        e.preventDefault();
        const form = this;

        // Validation HTML5 native + custom validation pour lignes
        if (!form.checkValidity()) {
            form.classList.add('was-validated');
            return;
        }

        // Validation des lignes : au moins une et toutes valides
        const lignes = [];
        const lignesDivs = document.querySelectorAll(".ligneCommande");
        if (lignesDivs.length === 0) {
            alert("Veuillez ajouter au moins une ligne de commande.");
            return;
        }

        for (const div of lignesDivs) {
            const produitInput = div.querySelector(".produitId");
            const quantiteInput = div.querySelector(".quantite");

            if (!produitInput.value || parseInt(produitInput.value) < 1) {
                produitInput.classList.add('is-invalid');
                alert("Veuillez saisir un ID produit valide (>=1).");
                return;
            } else {
                produitInput.classList.remove('is-invalid');
            }
            if (!quantiteInput.value || parseInt(quantiteInput.value) < 1) {
                quantiteInput.classList.add('is-invalid');
                alert("Veuillez saisir une quantité valide (>=1).");
                return;
            } else {
                quantiteInput.classList.remove('is-invalid');
            }
            lignes.push({ produitId: parseInt(produitInput.value), quantite: parseInt(quantiteInput.value) });
        }

        const nomClient = document.getElementById("nomClient").value.trim();
        const dateCommande = document.getElementById("dateCommande").value;

        const payload = { nomClient, dateCommande, lignes };

        try {
            const response = await fetch("/api/commandes", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert("✅ Commande créée avec succès !");
                form.reset();
                document.getElementById("lignesContainer").innerHTML = "";
                document.getElementById("dateCommande").value = today;
                ajouterLigne();
                form.classList.remove('was-validated');
            } else {
                const errorText = await response.text();
                alert("❌ Erreur lors de la création : " + errorText);
            }
        } catch (err) {
            alert("❌ Erreur réseau : " + err.message);
        }
    });

    function ajouterLigne() {
        const container = document.getElementById("lignesContainer");
        const ligne = document.createElement("div");
        ligne.className = "ligneCommande d-flex gap-2 mb-2";
        ligne.innerHTML = `
            <input type="number" class="form-control produitId" placeholder="ID Produit" min="1" required />
            <div class="invalid-feedback">Veuillez saisir un ID produit valide.</div>
            <input type="number" class="form-control quantite" placeholder="Quantité" min="1" required />
            <div class="invalid-feedback">Veuillez saisir une quantité valide.</div>
            <button type="button" class="btn btn-danger" onclick="this.parentNode.remove()">🗑 Supprimer</button>
        `;
        container.appendChild(ligne);
    }

    async function chargerCommandes() {
        const dateFiltre = document.getElementById("filtreDate").value || today;
        try {
            const response = await fetch(`/api/commandes?date=${dateFiltre}`);
            if (!response.ok) {
                const errText = await response.text();
                alert("❌ Erreur lors du chargement : " + errText);
                return;
            }
            const commandes = await response.json();
            const liste = document.getElementById("commandeListe");
            liste.innerHTML = "";

            if (commandes.length === 0) {
                const aucun = document.createElement("li");
                aucun.className = "list-group-item text-center text-muted";
                aucun.textContent = "Aucune commande trouvée pour cette date.";
                liste.appendChild(aucun);
                return;
            }

            commandes.forEach(c => {
                const item = document.createElement("li");
                item.className = "list-group-item d-flex justify-content-between align-items-center flex-wrap";
                const texteInfo = document.createElement("div");
                texteInfo.innerHTML = `
                    <strong>${c.nomClient}</strong> — <small>${c.dateCommande}</small>
                    <span class="badge bg-secondary ms-2">${c.lignes.length} ligne(s)</span>
                `;
                const btnFacture = document.createElement("button");
                btnFacture.className = "btn btn-sm btn-outline-secondary mt-2 mt-md-0";
                btnFacture.textContent = "🧾 Facture";
                btnFacture.onclick = () => afficherFacture(c.id);
                item.appendChild(texteInfo);
                item.appendChild(btnFacture);
                liste.appendChild(item);
            });
        } catch (err) {
            alert("❌ Erreur réseau lors du chargement des commandes : " + err.message);
        }
    }

    async function afficherFacture(id) {
        try {
            const response = await fetch(`/api/commandes/${id}/facture`);
            if (!response.ok) {
                const errMsg = await response.text();
                alert("❌ Erreur lors de la génération de la facture : " + errMsg);
                return;
            }
            const factureTexte = await response.text();
            const w = window.open("", "_blank");
            w.document.write(`<pre style="white-space: pre-wrap; font-family: monospace;">${factureTexte}</pre>`);
            w.document.title = "Facture Commande #" + id;
        } catch (err) {
            alert("❌ Erreur réseau lors de la récupération de la facture : " + err.message);
        }
    }

    async function chargerRapport() {
        const selectedDate = document.getElementById("rapportDate").value;
        if (!selectedDate) {
            alert("Veuillez sélectionner une date.");
            return;
        }

        try {
            const response = await fetch(`/api/commandes/rapport?date=${selectedDate}`);
            if (!response.ok) {
                const msg = await response.text();
                alert("Erreur lors de la récupération du rapport : " + msg);
                return;
            }

            const data = await response.json();
            const { nombreCommandes, chiffreAffaires, topProduits } = data;

            let htmlRapport = `
              <ul>
                <li>Nombre de commandes : ${nombreCommandes}</li>
                <li>Chiffre d'affaires : ${chiffreAffaires} FCFA</li>
              </ul>
              <h3>Top 5 des produits</h3>
              <ol>
            `;

            topProduits.forEach(p => {
                const nom = p.nom || p.name || p.produit || JSON.stringify(p);
                const quantite = p.quantite || p.quantity || 0;
                htmlRapport += `<li>${nom} - ${quantite} ex</li>`;
            });

            htmlRapport += `</ol>`;

            document.getElementById('rapportResultat').innerHTML = htmlRapport;

        } catch (err) {
            alert("Erreur chargement rapport : " + err.message);
        }
    }
</script>
</body>

</html>
