<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>Gestion des produits</title>
    <style>
        body {
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          margin: 0;
          padding: 30px 40px;
          background-color: #f8f9fa;
        }

        h1 {
          text-align: center;
          color: #333;
          margin-bottom: 20px;
        }

        #searchBar {
          width: 100%;
          max-width: 400px;
          margin: 0 auto 20px;
          padding: 10px;
          display: block;
          border-radius: 8px;
          border: 1px solid #ced4da;
        }

        .form-container {
          display: none;
          max-width: 600px;
          margin: 0 auto 40px;
          padding: 20px;
          background-color: #ffffff;
          border: 1px solid #dee2e6;
          border-radius: 12px;
          box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .form-container form > div {
          margin-bottom: 20px;
        }

        label {
          display: block;
          font-weight: 600;
          margin-bottom: 6px;
        }

        input[type="text"],
        input[type="number"],
        input[type="file"] {
          width: 100%;
          padding: 10px;
          border: 1px solid #ced4da;
          border-radius: 8px;
        }

        .form-actions {
          display: flex;
          justify-content: space-between;
        }

        /* Boutons modifiés pour Bootstrap-like */
        button.btn {
          padding: 10px 20px;
          border: none;
          font-weight: bold;
          border-radius: 8px;
          cursor: pointer;
          transition: background-color 0.3s;
          color: white;
        }

        button.btn-primary {
          background-color: #007bff;
        }
        button.btn-primary:hover {
          background-color: #0056b3;
        }

        button.btn-warning {
          background-color: #ffc107;
          color: #212529;
        }
        button.btn-warning:hover {
          background-color: #e0a800;
          color: #212529;
        }

        button.btn-danger {
          background-color: #dc3545;
        }
        button.btn-danger:hover {
          background-color: #b02a37;
        }

        button.btn-secondary {
          background-color: #6c757d;
        }
        button.btn-secondary:hover {
          background-color: #565e64;
        }

        .table-wrapper {
          max-width: 1000px;
          margin: auto;
          overflow-x: auto;
        }

        table {
          width: 100%;
          border-collapse: collapse;
          background-color: white;
          box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        th, td {
          border: 1px solid #dee2e6;
          padding: 12px;
          text-align: center;
        }

        th {
          background-color: #f1f1f1;
          font-weight: bold;
        }

        tr.low-stock {
          background-color: #ffe5e5;
        }

        img {
          width: 50px;
          height: auto;
          border-radius: 6px;
        }

        #toastContainer {
          position: fixed;
          top: 20px;
          right: 20px;
          z-index: 9999;
        }

        .toast {
          padding: 12px 20px;
          margin-bottom: 10px;
          border-radius: 6px;
          color: white;
          font-weight: bold;
          box-shadow: 0 2px 6px rgba(0,0,0,0.2);
          animation: slideIn 0.4s ease-out;
        }

        .toast.success {
          background-color: #28a745;
        }

        .toast.error {
          background-color: #dc3545;
        }

        @keyframes slideIn {
          from {
            opacity: 0;
            transform: translateX(100%);
          }
          to {
            opacity: 1;
            transform: translateX(0);
          }
        }

        #btnShowForm {
          display: block;
          margin: 10px auto 30px;
          padding: 10px 20px;
          font-weight: bold;
          background-color: #28a745;
          color: white;
          border: none;
          border-radius: 8px;
          cursor: pointer;
          transition: background-color 0.3s;
        }

        #btnShowForm:hover {
          background-color: #218838;
        }
    </style>
</head>
<body>

<h1>Gestion des produits</h1>

<input type="text" id="searchBar" placeholder="Rechercher un produit par nom ou catégorie..." />
<button id="btnShowForm" class="btn btn-success">Ajouter un produit</button>

<div class="form-container" id="formContainer">
    <form id="produitForm" enctype="multipart/form-data" autocomplete="off">
        <input type="hidden" id="produitId" name="produitId" />
        <div>
            <label for="nom">Nom *</label>
            <input type="text" id="nom" name="nom" required />
        </div>
        <div>
            <label for="categorie">Catégorie *</label>
            <input type="text" id="categorie" name="categorie" required />
        </div>
        <div>
            <label for="prixUnitaire">Prix unitaire *</label>
            <input type="number" id="prixUnitaire" name="prixUnitaire" step="0.01" min="0" required />
        </div>
        <div>
            <label for="quantiteStock">Quantité en stock *</label>
            <input type="number" id="quantiteStock" name="quantiteStock" min="0" required />
        </div>
        <div>
            <label for="seuilReapprovisionnement">Seuil de réapprovisionnement *</label>
            <input type="number" id="seuilReapprovisionnement" name="seuilReapprovisionnement" min="0" required />
        </div>
        <div>
            <label for="imageFile">Image du produit *</label>
            <input type="file" id="imageFile" name="imageFile" accept="image/*" required />
        </div>
        <div class="form-actions">
            <button type="submit" id="submitBtn" class="btn btn-primary">Enregistrer</button>
            <button type="button" id="btnAnnuler" class="btn btn-secondary" style="display:none;">Annuler</button>
        </div>
    </form>
</div>

<div class="table-wrapper">
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Image</th>
            <th>Nom</th>
            <th>Catégorie</th>
            <th>Prix Unitaire</th>
            <th>Stock</th>
            <th>Seuil</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="produitsTableBody"></tbody>
    </table>
</div>

<div id="toastContainer"></div>

<script>
    const apiUrl = 'http://localhost:8080/api/produits';

    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.classList.add('toast', type);
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => container.removeChild(toast), 400);
      }, 3000);
    }

    async function chargerProduits() {
      try {
        const response = await fetch(apiUrl);
        if (!response.ok) throw new Error("Erreur lors du chargement des produits.");
        const produits = await response.json();
        afficherProduits(produits);
        afficherAlertesStock(produits);
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    function afficherProduits(produits) {
      const tbody = document.getElementById('produitsTableBody');
      tbody.innerHTML = '';
      produits.forEach(p => {
        const isStockBas = p.quantiteStock <= p.seuilReapprovisionnement;
        const row = document.createElement('tr');
        if (isStockBas) row.classList.add('low-stock');
        row.innerHTML = `
          <td>${p.id}</td>
          <td><img src="${p.imageUrl || 'images/default.png'}" alt="Image" /></td>
          <td class="nom">${p.nom}</td>
          <td class="categorie">${p.categorie}</td>
          <td>${p.prixUnitaire.toFixed(2)} F cfa</td>
          <td>${p.quantiteStock}</td>
          <td>${p.seuilReapprovisionnement}</td>
          <td>
            <button class="btn btn-warning btn-sm me-2" onclick="modifierProduit(${p.id})">Modifier</button>
            <button class="btn btn-danger btn-sm" onclick="supprimerProduit(${p.id})">Supprimer</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    function afficherAlertesStock(produits) {
      produits.forEach(p => {
        if (p.quantiteStock <= p.seuilReapprovisionnement) {
          showToast(`⚠ Stock bas pour "${p.nom}" (${p.quantiteStock})`, 'error');
        }
      });
    }

    document.getElementById('searchBar').addEventListener('input', e => {
      const filtre = e.target.value.toLowerCase();
      const rows = document.querySelectorAll('#produitsTableBody tr');
      rows.forEach(row => {
        const nom = row.querySelector('.nom').textContent.toLowerCase();
        const cat = row.querySelector('.categorie').textContent.toLowerCase();
        row.style.display = (nom.includes(filtre) || cat.includes(filtre)) ? '' : 'none';
      });
    });

    async function supprimerProduit(id) {
      if (confirm("Supprimer ce produit ?")) {
        try {
          const response = await fetch(`${apiUrl}/${id}`, { method: 'DELETE' });
          if (!response.ok) throw new Error("Erreur lors de la suppression.");
          showToast("Produit supprimé avec succès.");
          chargerProduits();
        } catch (error) {
          showToast(error.message, 'error');
        }
      }
    }

    async function modifierProduit(id) {
      try {
        const response = await fetch(`${apiUrl}/${id}`);
        if (!response.ok) throw new Error("Erreur lors du chargement du produit.");
        const p = await response.json();
        document.getElementById('formContainer').style.display = 'block';
        document.getElementById('produitId').value = p.id;
        document.getElementById('nom').value = p.nom;
        document.getElementById('categorie').value = p.categorie;
        document.getElementById('prixUnitaire').value = p.prixUnitaire;
        document.getElementById('quantiteStock').value = p.quantiteStock;
        document.getElementById('seuilReapprovisionnement').value = p.seuilReapprovisionnement;
        document.getElementById('imageFile').value = '';
        document.getElementById('submitBtn').textContent = 'Modifier';
        document.getElementById('btnAnnuler').style.display = 'inline-block';
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    document.getElementById('btnShowForm').addEventListener('click', () => {
      document.getElementById('formContainer').style.display = 'block';
      document.getElementById('produitForm').reset();
      document.getElementById('produitId').value = '';
      document.getElementById('submitBtn').textContent = 'Enregistrer';
      document.getElementById('btnAnnuler').style.display = 'none';
    });

    document.getElementById('btnAnnuler').onclick = () => {
      document.getElementById('produitForm').reset();
      document.getElementById('produitId').value = '';
      document.getElementById('formContainer').style.display = 'none';
    };

    document.getElementById('produitForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('produitId').value;
      const formData = new FormData(e.target);
      const url = id ? `${apiUrl}/${id}` : apiUrl;
      const method = id ? 'PUT' : 'POST';

      try {
        const response = await fetch(url, { method, body: formData });
        if (!response.ok) throw new Error("Erreur lors de l'enregistrement.");
        showToast(id ? "Produit modifié." : "Produit ajouté.");
        e.target.reset();
        document.getElementById('formContainer').style.display = 'none';
        chargerProduits();
      } catch (error) {
        showToast(error.message, 'error');
      }
    });

    chargerProduits();
</script>

</body>
</html>
